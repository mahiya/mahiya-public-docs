    margin: 0;
    padding: 24px;
    font-size: 14px;
    line-height: 1.5;
  }
  h1 {

    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 16px;
    font-size: 13px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    align-items: center;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-header);
  }
  .controls label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 4px;
  }
  .controls input[type="text"],
  .controls input[type="number"] {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
  }
  .controls input[type="number"] { width: 80px; }
  .controls input[type="text"] { width: 180px; }
  .maker-filters {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .maker-filters label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
  }
  .reset-btn {
    margin-left: auto;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
  }
  .reset-btn:hover { background: var(--bg-hover); }
  .row-count {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 8px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    border: 1px solid var(--border);
  }
  th, td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--bg-header);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  th:hover { background: var(--bg-hover); }
  th .sort-indicator {
    display: inline-block;
    margin-left: 4px;
    color: var(--text-muted);
    font-size: 10px;
  }
  th.sorted .sort-indicator { color: var(--accent); }
  tr:nth-child(even) td { background: var(--bg-row-alt); }
  tr:hover td { background: var(--bg-hover); }
  td.numeric { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted { color: var(--text-muted); }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  <h1>GPU / AI Accelerator Specs</h1>
  <div class="subtitle">52 chips. Click column headers to sort. Use the controls below to filter.</div>

      <input type="number" id="bandwidthMin" placeholder="min">

    <div class="group">

      <input type="number" id="tflops_fp16Min" placeholder="min">
      <span>–</span>
      <input type="number" id="tflops_fp16Max" placeholder="max">

    <div class="group">
      <label>Release</label>
      <input type="text" id="releaseFilter" placeholder="e.g. 2024">
    </div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>

  <div class="row-count" id="rowCount"></div>

    <tbody id="tableBody"></tbody>

    sortKey: 'bandwidth',
    sortDir: 'desc',
    makers: new Set(),
  };

  function uniqueMakers() {
    return Array.from(new Set(DATA.map(c => c.maker))).sort();
  }

  function buildMakerFilters() {
    const container = document.getElementById('makerFilters');
    const makers = uniqueMakers();
    state.makers = new Set(makers);
    const allLabel = document.createElement('label');
    allLabel.innerHTML = '<strong>Maker:</strong>';
    allLabel.style.cursor = 'default';
    container.appendChild(allLabel);
    for (const m of makers) {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = m;
      cb.checked = true;
      cb.addEventListener('change', () => {
        if (cb.checked) state.makers.add(m); else state.makers.delete(m);
        render();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(m));
      container.appendChild(label);
    }
  }

  function buildHeader() {
    const tr = document.getElementById('headerRow');
    for (const [key, label] of HEADERS) {
      const th = document.createElement('th');
      th.textContent = label;
      const ind = document.createElement('span');
      ind.className = 'sort-indicator';
      ind.textContent = '▲▼';
      th.appendChild(ind);
      th.dataset.key = key;
      th.addEventListener('click', () => {
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = key;
          state.sortDir = NUMERIC_KEYS.includes(key) ? 'desc' : 'asc';
        }
        render();
      });
      tr.appendChild(th);
    }
  }

  function compareValues(a, b, key, dir) {
    const av = a[key];
    const bv = b[key];
    const aNull = av === null || av === undefined;
    const bNull = bv === null || bv === undefined;
    if (aNull && bNull) return 0;
    if (aNull) return 1;
    if (bNull) return -1;
    let cmp;
    if (NUMERIC_KEYS.includes(key)) {
      cmp = av - bv;
    } else {
      cmp = String(av).localeCompare(String(bv));
    }
    return dir === 'asc' ? cmp : -cmp;
  }

  function getNum(id) {
    const v = document.getElementById(id).value;
    return v === '' ? null : Number(v);
  }

  function applyFilters(rows) {
    const nameQ = document.getElementById('nameFilter').value.trim().toLowerCase();
    const releaseQ = document.getElementById('releaseFilter').value.trim().toLowerCase();
    const ranges = {};
    for (const k of NUMERIC_KEYS) {
      ranges[k] = { min: getNum(k + 'Min'), max: getNum(k + 'Max') };
    }
    return rows.filter(c => {
      if (!state.makers.has(c.maker)) return false;
      if (nameQ && !String(c.name).toLowerCase().includes(nameQ)) return false;
      if (releaseQ && !String(c.release_date || '').toLowerCase().includes(releaseQ)) return false;
      for (const k of NUMERIC_KEYS) {
        const v = c[k];
        const { min, max } = ranges[k];
        if (min !== null) {
          if (v === null || v === undefined || v < min) return false;
        }
        if (max !== null) {
          if (v === null || v === undefined || v > max) return false;
        }
      }
      return true;
    });
  }

  function render() {
    const filtered = applyFilters(DATA.slice());
    filtered.sort((a, b) => compareValues(a, b, state.sortKey, state.sortDir));

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (const c of filtered) {
      const tr = document.createElement('tr');
      for (const [key, _] of HEADERS) {
        const td = document.createElement('td');
        const v = c[key];
        if (v === null || v === undefined) {
          td.textContent = '-';
          td.className = (NUMERIC_KEYS.includes(key) ? 'numeric ' : '') + 'muted';
        } else if (key === 'name') {
          const refs = c.references || [];
          if (refs.length > 0) {
            const a = document.createElement('a');
            a.href = refs[0];
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = v;
            td.appendChild(a);
          } else {
            td.textContent = v;
          }
        } else {
          td.textContent = v;
          if (NUMERIC_KEYS.includes(key)) td.className = 'numeric';
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }

    document.getElementById('rowCount').textContent =
      `Showing ${filtered.length} of ${DATA.length} chips`;

    document.querySelectorAll('th').forEach(th => {
      const ind = th.querySelector('.sort-indicator');
      if (th.dataset.key === state.sortKey) {
        th.classList.add('sorted');
        ind.textContent = state.sortDir === 'asc' ? '▲' : '▼';
      } else {
        th.classList.remove('sorted');
        ind.textContent = '▲▼';
      }
    });
  }

  function bindFilters() {
    const ids = ['nameFilter', 'releaseFilter'];
    for (const k of NUMERIC_KEYS) { ids.push(k + 'Min', k + 'Max'); }
    for (const id of ids) {
      document.getElementById(id).addEventListener('input', render);
    }
    document.getElementById('resetBtn').addEventListener('click', () => {
      for (const id of ids) document.getElementById(id).value = '';
      document.querySelectorAll('#makerFilters input[type="checkbox"]').forEach(cb => {
        cb.checked = true;
        state.makers.add(cb.value);
      });
      state.sortKey = 'bandwidth';
      state.sortDir = 'desc';
      render();
    });
  }

  buildMakerFilters();
  buildHeader();
  bindFilters();
  render();
</script>
</body>
</html>
